name: Job Scraper

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 10-23,0 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
  GH_TOKEN: ${{ secrets.GH_TOKEN }}
  GOOGLE_KEY_JSON: ${{ secrets.GOOGLE_KEY_JSON }}
  ICONS_ID: ${{ secrets.ICONS_ID }}
  ICONS_API: ${{ secrets.ICONS_API }}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          persist-credentials: true

      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Scrape jobs
        run: .venv/bin/python main.py

      - name: Generate README
        run: .venv/bin/python generate_readme.py

      - name: Commit results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add storage.json README.md icons.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update storage.json, readme and icons.json [bot]"
            git pull --rebase origin main
            git push
          fi

  retry:
    needs: run
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Wait before retry
        run: sleep 300

      - uses: actions/checkout@v3
        with:
          persist-credentials: true

      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Scrape jobs (retry)
        run: .venv/bin/python main.py

      - name: Generate README
        run: .venv/bin/python generate_readme.py

      - name: Commit results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add storage.json README.md icons.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update storage.json, readme and icons.json [bot]"
            git pull --rebase origin main
            git push
          fi
